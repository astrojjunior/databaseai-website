<!DOCTYPE html>
<html>
<head>
<title>DatabaseAI</title>

<style>
body {
  margin:0;
  background:#000;
  color:white;
  font-family: Arial;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header {
  text-align:center;
  padding:15px;
  color:gold;
  font-weight:bold;
}

/* CHAT AREA */
.chat {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg {
  margin:8px 0;
  padding:12px;
  border-radius:12px;
}

.user { background:#222; }
.ai { background:#333; }

/* INPUT AREA */
.input-area {
  padding:10px;
  border-top:1px solid #222;
}

textarea {
  width:100%;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  padding:10px;
}

/* ACTION BAR */
.actions {
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

.actions button {
  flex:1;
  margin:3px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
}

/* SEND */
.send-btn {
  width:100%;
  margin-top:10px;
  padding:12px;
  background:gold;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">DatabaseAI</div>

<div id="chat" class="chat"></div>

<div class="input-area">

  <textarea id="input" placeholder="Think, ask, paste, analyze..."></textarea>

  <div class="actions">
    <button onclick="mode='chat'">Chat</button>
    <button onclick="mode='analyze'">Analyze</button>
    <button onclick="triggerUpload()">Upload</button>
    <button onclick="loadVault()">Vault</button>
  </div>

  <input type="file" id="fileInput" style="display:none">

  <button class="send-btn" onclick="send()">Execute</button>

</div>

<script>
let token = "";
let mode = "chat";

/* SEND CORE */
async function send(){
  const text = input.value;

  chat.innerHTML += `<div class="msg user">${text}</div>`;

  let finalText = text;

  if(mode === "analyze"){
    finalText = "Analyze deeply:\n\n" + text;
  }

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({message:finalText})
  });

  const data = await res.json();

  chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;

  input.value="";
}

/* FILE UPLOAD */
function triggerUpload(){
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", async function(){
  const file = this.files[0];

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("/upload",{
    method:"POST",
    headers:{Authorization:token},
    body:formData
  });

  const data = await res.json();

  chat.innerHTML += `<div class="msg ai">${data.analysis}</div>`;
});

/* VAULT */
async function loadVault(){
  const res = await fetch("/vault",{headers:{Authorization:token}});
  const data = await res.json();

  chat.innerHTML += `<div class="msg ai">${JSON.stringify(data)}</div>`;
}
</script>

</body>
</html>
