<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DatabaseAI</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#ffd700;
  overflow:hidden;
}

/* GRID BACKGROUND */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,215,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,215,0,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:-1;
}

/* HEADER */
.header{
  text-align:center;
  padding:10px;
  letter-spacing:3px;
}

/* CORE */
.core{
  width:150px;
  height:150px;
  margin:20px auto;
  border-radius:50%;
  background:radial-gradient(circle,#ffd700,#000);
  box-shadow:0 0 80px #ffd700;
  transition:0.4s;
}

.core.active{
  box-shadow:0 0 150px #ffd700;
  transform:scale(1.1);
}

/* GRID */
.system-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.system-card{
  background:linear-gradient(145deg,#111,#000);
  border:1px solid rgba(255,215,0,0.5);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 20px rgba(255,215,0,0.2);
  transition:0.3s;
}

.system-card:hover{
  transform:scale(1.05);
  box-shadow:0 0 40px rgba(255,215,0,0.6);
}

.system-card h3{
  margin:0;
  font-size:14px;
}

.system-card p{
  font-size:11px;
  color:#aaa;
}

/* COMMAND BAR */
.command-bar{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  background:#000;
}

.command-input{
  width:100%;
  padding:15px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}

/* MODE SCREEN */
.mode-screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  flex-direction:column;
  transform:scale(1.1);
  opacity:0;
  pointer-events:none;
  transition:all 0.4s ease;
}

.mode-screen.active{
  transform:scale(1);
  opacity:1;
  pointer-events:auto;
}

/* HEADER INSIDE MODE */
.mode-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.6);
  border-bottom:1px solid rgba(255,215,0,0.3);
}

.back-btn{
  padding:8px 14px;
  border-radius:12px;
  border:1px solid rgba(255,215,0,0.6);
  background: rgba(255,215,0,0.05);
}

.mode-content{
  flex:1;
  overflow:auto;
  padding:15px;
}

/* INPUT */
textarea{
  width:100%;
  padding:15px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}

/* BUTTON */
.send-btn{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ffd700,#00ffcc);
}

/* CHAT */
.msg{
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}

.user{ background:#222; }
.ai{ background:rgba(255,215,0,0.1); }

</style>
</head>

<body>

<div class="header">DATABASE AI</div>
<div class="core"></div>

<!-- GRID -->
<div class="system-grid">

  <div class="system-card" onclick="openMode('business')">
    <h3>BUSINESS ENGINE</h3>
    <p>Strategy • Growth • Monetization</p>
  </div>

  <div class="system-card" onclick="openMode('mind')">
    <h3>MIND SYSTEM</h3>
    <p>Clarity • Emotional Intelligence</p>
  </div>

  <div class="system-card" onclick="openMode('analysis')">
    <h3>ANALYSIS CORE</h3>
    <p>Breakdown • Insight</p>
  </div>

  <div class="system-card" onclick="openMode('vault')">
    <h3>MEMORY VAULT</h3>
    <p>Stored Intelligence</p>
  </div>

  <div class="system-card" onclick="openMode('create')">
    <h3>CREATE ENGINE</h3>
    <p>Build Systems</p>
  </div>

  <div class="system-card" onclick="openMode('chat')">
    <h3>AI COMMAND</h3>
    <p>Direct Intelligence</p>
  </div>

</div>

<!-- COMMAND -->
<div class="command-bar">
  <input class="command-input" id="quickInput" placeholder="Command the system..." onkeydown="quickSend(event)">
</div>

<!-- MODE SCREEN -->
<div id="modeScreen" class="mode-screen">

  <div class="mode-header">
    <div class="back-btn" onclick="closeMode()">RETURN</div>
    <div id="modeTitle"></div>
  </div>

  <div class="mode-content" id="modeContent"></div>

</div>

<script>

let startY=0;

/* OPEN */
function openMode(type){
  const screen=document.getElementById("modeScreen");
  const title=document.getElementById("modeTitle");

  screen.classList.add("active");
  document.querySelector(".core").classList.remove("active");

  title.innerText=type.toUpperCase();

  if(type==="vault"){
    document.getElementById("modeContent").innerHTML=`<button onclick="clearVault()">CLEAR</button><div id="vaultData"></div>`;
    loadVault();
  } else {
    document.getElementById("modeContent").innerHTML=getChatUI();
  }
}

/* CLOSE */
function closeMode(){
  const screen=document.getElementById("modeScreen");
  const core=document.querySelector(".core");

  screen.classList.remove("active");

  core.classList.add("active");
  setTimeout(()=>core.classList.remove("active"),600);
}

/* SWIPE CLOSE */
document.getElementById("modeScreen").addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
});

document.getElementById("modeScreen").addEventListener("touchmove",e=>{
  let moveY=e.touches[0].clientY;
  if(moveY-startY>120){
    closeMode();
  }
});

/* CHAT UI */
function getChatUI(){
  return `
    <textarea id="input"></textarea>
    <button class="send-btn" onclick="send()">EXECUTE</button>
    <div id="chat"></div>
  `;
}

/* SEND */
async function send(){
  const input=document.getElementById("input").value;
  if(!input)return;

  const chat=document.getElementById("chat");
  chat.innerHTML+=`<div class="msg user">${input}</div>`;

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:input})
  });

  const data=await res.json();
  chat.innerHTML+=`<div class="msg ai">${data.reply}</div>`;

  saveMemory(input,data.reply);
}

/* QUICK COMMAND */
function quickSend(e){
  if(e.key==="Enter"){
    openMode("chat");
    setTimeout(()=>{
      document.getElementById("input").value=document.getElementById("quickInput").value;
      send();
    },200);
  }
}

/* MEMORY */
function saveMemory(user,ai){
  let mem=JSON.parse(localStorage.getItem("memory")||"[]");
  mem.push({user,ai});
  localStorage.setItem("memory",JSON.stringify(mem));
}

function loadVault(){
  let mem=JSON.parse(localStorage.getItem("memory")||"[]");
  let html="";
  mem.forEach(m=>{
    html+=`<div class="msg user">${m.user}</div>`;
    html+=`<div class="msg ai">${m.ai}</div>`;
  });
  document.getElementById("vaultData").innerHTML=html;
}

function clearVault(){
  localStorage.removeItem("memory");
  loadVault();
}

</script>

</body>
</html>
