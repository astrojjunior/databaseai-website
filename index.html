<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#ffd700;
}

/* GRID BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    linear-gradient(rgba(255,215,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,215,0,0.05) 1px, transparent 1px);
  background-size:30px 30px;
  z-index:-1;
}

/* HEADER */
.header{
  text-align:center;
  padding:10px;
  font-size:14px;
  letter-spacing:2px;
}

/* CORE */
.core{
  width:120px;
  height:120px;
  margin:10px auto;
  border-radius:50%;
  background:radial-gradient(circle,#ffd700,#000);
  box-shadow:0 0 80px #ffd700;
}

/* GRID SYSTEM */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  padding:15px;
  border-radius:15px;
  background:#111;
  border:1px solid rgba(255,215,0,0.3);
  font-size:13px;
}

/* SUB GRID */
.subgrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.small{
  padding:10px;
  border-radius:10px;
  background:#000;
  border:1px solid rgba(255,215,0,0.2);
  font-size:11px;
}

/* COMMAND */
.command{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  display:flex;
  gap:10px;
  background:#000;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
}

/* MODE SCREEN */
.mode{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}

.mode.active{
  display:flex;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  font-size:12px;
}

.back{
  padding:5px 10px;
  border:1px solid #ffd700;
  border-radius:8px;
}

/* CHAT */
.chat{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}

.user{ background:#222; }
.ai{ background:#111; }

</style>
</head>

<body>

<div class="header">DATABASE AI</div>
<div class="core"></div>

<div class="grid">

  <div class="card" onclick="openMode()">
    BUSINESS ENGINE
    <div class="subgrid">
      <div class="small">Startup</div>
      <div class="small">Scale</div>
      <div class="small">Money</div>
      <div class="small">Strategy</div>
    </div>
  </div>

  <div class="card" onclick="openMode()">
    MIND SYSTEM
    <div class="subgrid">
      <div class="small">Focus</div>
      <div class="small">Discipline</div>
      <div class="small">Clarity</div>
      <div class="small">Healing</div>
    </div>
  </div>

  <div class="card" onclick="openMode()">
    ANALYSIS CORE
    <div class="subgrid">
      <div class="small">Breakdown</div>
      <div class="small">Deep Think</div>
      <div class="small">Patterns</div>
      <div class="small">Insights</div>
    </div>
  </div>

  <div class="card" onclick="openMode()">
    VAULT
    <div class="subgrid">
      <div class="small">Ideas</div>
      <div class="small">Plans</div>
      <div class="small">Files</div>
      <div class="small">Memory</div>
    </div>
  </div>

  <div class="card" onclick="openMode()">
    CREATE ENGINE
    <div class="subgrid">
      <div class="small">Build App</div>
      <div class="small">Website</div>
      <div class="small">System</div>
      <div class="small">Automation</div>
    </div>
  </div>

  <div class="card" onclick="openMode()">
    KNOWLEDGE CORE
    <div class="subgrid">
      <div class="small">Books</div>
      <div class="small">History</div>
      <div class="small">People</div>
      <div class="small">World</div>
    </div>
  </div>

</div>

<div class="command">
  <input id="input" placeholder="Command the system...">
</div>

<div id="mode" class="mode">

  <div class="top">
    <div class="back" onclick="closeMode()">BACK</div>
    <div>AI CORE</div>
  </div>

  <div id="chat" class="chat"></div>

</div>

<script>

/* OPEN */
function openMode(){
  document.getElementById("mode").classList.add("active");
}

/* CLOSE */
function closeMode(){
  document.getElementById("mode").classList.remove("active");
}

/* SEND */
async function send(msg){

  const chat=document.getElementById("chat");

  chat.innerHTML+=`<div class="msg user">${msg}</div>`;

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:msg})
  });

  const data=await res.json();

  chat.innerHTML+=`<div class="msg ai">${data.reply}</div>`;
}

/* ENTER */
document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    openMode();
    send(e.target.value);
    e.target.value="";
  }
});

</script>

</body>
</html>
