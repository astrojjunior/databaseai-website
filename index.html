<!DOCTYPE html>
<html>
<head>
<title>DatabaseAI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Orbitron', sans-serif;
  overflow:hidden;
  color:#ffd700;

  background:
    radial-gradient(circle at center, rgba(255,215,0,0.15), transparent 60%),
    #000;
}

/* 🌌 BACKGROUND GRID */
.grid {
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,215,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,215,0,0.05) 1px, transparent 1px);
  background-size:50px 50px;
  animation:moveGrid 10s linear infinite;
}

@keyframes moveGrid {
  0% { transform:translateY(0); }
  100% { transform:translateY(50px); }
}

/* 🔥 AI CORE */
.core {
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  width:150px;
  height:150px;
  border-radius:50%;

  background:radial-gradient(circle, #ffd700, #000);
  box-shadow:
    0 0 30px #ffd700,
    0 0 60px #ffd700,
    inset 0 0 30px #000;

  animation:pulse 2s infinite;
}

@keyframes pulse {
  0% { transform:translate(-50%,-50%) scale(1); }
  50% { transform:translate(-50%,-50%) scale(1.1); }
  100% { transform:translate(-50%,-50%) scale(1); }
}

/* HEADER */
.header {
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  color:#ffd700;
  text-shadow:0 0 15px #ffd700;
}

/* CHAT */
.chat {
  position:absolute;
  top:60%;
  width:100%;
  height:30%;
  overflow-y:auto;
  padding:10px;
}

/* MESSAGES */
.msg {
  margin:8px 0;
  padding:12px;
  border-radius:10px;
  background:rgba(255,215,0,0.05);
  border:1px solid #ffd700;
  box-shadow:0 0 10px rgba(255,215,0,0.4);
}

/* INPUT */
.input-area {
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
}

textarea {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ffd700;
  background:black;
  color:#ffd700;
}

/* BUTTONS */
.actions {
  display:flex;
  margin-top:5px;
}

.actions button {
  flex:1;
  margin:2px;
  padding:10px;
  background:black;
  border:1px solid #ffd700;
  color:#ffd700;
}

/* SEND */
.send-btn {
  width:100%;
  margin-top:5px;
  padding:12px;
  background:linear-gradient(90deg,#ffd700,#00fff7);
  border:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="header">DatabaseAI</div>

<div class="core"></div>

<div id="chat" class="chat"></div>

<div class="input-area">

  <textarea id="input" placeholder="Command the system..."></textarea>

  <div class="actions">
    <button onclick="mode='chat'">Chat</button>
    <button onclick="mode='analyze'">Analyze</button>
    <button onclick="upload()">Upload</button>
    <button onclick="vault()">Vault</button>
  </div>

  <button class="send-btn" onclick="send()">EXECUTE</button>

</div>

<script>
let mode="chat";

/* SEND */
async function send(){
  const text=input.value;
  chat.innerHTML+=`<div class="msg">${text}</div>`;

  let final=text;
  if(mode==="analyze"){
    final="Analyze deeply:\n\n"+text;
  }

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:final})
  });

  const data=await res.json();

  type(data.reply);
  input.value="";
}

/* TYPE EFFECT */
function type(t){
  let i=0;
  let out="";
  const box=document.createElement("div");
  box.className="msg";
  chat.appendChild(box);

  const inter=setInterval(()=>{
    out+=t[i];
    box.innerHTML=out;
    i++;
    if(i>=t.length) clearInterval(inter);
  },10);
}

/* MOCK */
function upload(){
  type("Upload system ready.");
}

function vault(){
  type("Vault accessed.");
}
</script>

</body>
</html>
