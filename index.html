<!DOCTYPE html>
<html>
<head>
<title>DatabaseAI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:white;
  max-width:500px;
  margin:auto;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
  color:gold;
}

/* SCREENS */
.screen {
  display:none;
  padding:15px;
  padding-bottom:80px;
}

.active {
  display:block;
}

/* INPUTS */
input, textarea {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
}

/* BUTTON */
.main-btn {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:gold;
  color:black;
  font-weight:bold;
}

/* CHAT */
.chat-box {
  height:300px;
  overflow-y:auto;
}

.msg {
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}

.user { background:#222; }
.ai { background:#333; }

/* CARD */
.card {
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

/* NAV */
.bottom-nav {
  position:fixed;
  bottom:0;
  width:100%;
  max-width:500px;
  display:flex;
  justify-content:space-around;
  background:#111;
  padding:10px 0;
  border-top:1px solid #222;
}

.bottom-nav button {
  background:none;
  border:none;
  color:white;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">DatabaseAI</div>

<!-- AUTH -->
<div id="auth" class="screen active">
  <input id="email" placeholder="Email">
  <input id="pass" placeholder="Password" type="password">

  <button class="main-btn" onclick="signup()">Create Account</button>
  <button class="main-btn" onclick="login()">Login</button>
</div>

<!-- AI -->
<div id="ai" class="screen">
  <div id="chat" class="chat-box"></div>

  <input id="msg" placeholder="Ask anything...">
  <button class="main-btn" onclick="send()">Execute</button>
</div>

<!-- DISCOVER -->
<div id="discover" class="screen">
  <div class="card">
    <p>💡 Business Idea</p>
    <button onclick="quickAsk('Give me a powerful business idea')">Explore</button>
  </div>

  <div class="card">
    <p>📈 Growth</p>
    <button onclick="quickAsk('How to grow a startup')">Explore</button>
  </div>
</div>

<!-- DECODE -->
<div id="decode" class="screen">

  <!-- FILE -->
  <div class="card">
    <p>📁 Upload File</p>
    <input type="file" id="fileInput">
    <button class="main-btn" onclick="uploadFile()">Analyze File</button>
  </div>

  <!-- PASTE -->
  <div class="card">
    <p>🧠 Paste Text</p>
    <textarea id="pasteInput" placeholder="Paste anything..."></textarea>
    <button class="main-btn" onclick="analyzeText()">Analyze Text</button>
  </div>

  <div id="fileResult"></div>
</div>

<!-- VAULT -->
<div id="vault" class="screen">
  <button class="main-btn" onclick="loadVault()">Load Vault</button>
  <div id="vaultData"></div>
</div>

<!-- PREMIUM -->
<div id="premium" class="screen">
  <div class="card">
    <p>✔ Unlimited AI</p>
    <p>✔ File Analysis</p>
    <p>✔ Memory Vault</p>
  </div>

  <input id="ref" placeholder="Payment Ref">
  <button class="main-btn" onclick="pay()">Unlock</button>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <button onclick="show('ai')">AI</button>
  <button onclick="show('discover')">Discover</button>
  <button onclick="show('decode')">Decode</button>
  <button onclick="show('vault')">Vault</button>
  <button onclick="show('premium')">Premium</button>
</div>

<script>
let token="";

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* AUTH */
async function signup(){
  await fetch("/auth/signup",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email.value,password:pass.value})
  });
  alert("Account created");
}

async function login(){
  const r=await fetch("/auth/login",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email.value,password:pass.value})
  });
  const d=await r.json();
  token=d.token;
  alert("Logged in");
  show('ai');
}

/* CHAT */
async function send(){
  const text=msg.value;
  chat.innerHTML += `<div class="msg user">${text}</div>`;

  const r=await fetch("/api/chat",{
    method:"POST",
    headers:{
      'Content-Type':'application/json',
      'Authorization':token
    },
    body:JSON.stringify({message:text})
  });

  const d=await r.json();

  let i=0, out="";
  const box=document.createElement("div");
  box.className="msg ai";
  chat.appendChild(box);

  const interval=setInterval(()=>{
    out+=d.reply[i];
    box.innerHTML=out;
    i++;
    if(i>=d.reply.length) clearInterval(interval);
  },10);

  msg.value="";
}

/* DISCOVER */
function quickAsk(text){
  show('ai');
  msg.value=text;
  send();
}

/* FILE */
async function uploadFile(){
  const file=document.getElementById("fileInput").files[0];
  const formData=new FormData();
  formData.append("file",file);

  const res=await fetch("/upload",{
    method:"POST",
    headers:{Authorization:token},
    body:formData
  });

  const data=await res.json();
  fileResult.innerHTML=data.analysis;
}

/* PASTE */
async function analyzeText(){
  const text=pasteInput.value;

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{
      'Content-Type':'application/json',
      'Authorization':token
    },
    body:JSON.stringify({message:"Analyze this:\n\n"+text})
  });

  const data=await res.json();
  fileResult.innerHTML=data.reply;
}

/* VAULT */
async function loadVault(){
  const r=await fetch("/vault",{headers:{Authorization:token}});
  const d=await r.json();

  vaultData.innerHTML=d.map(v=>`
    <div class="card">
      <b>${v.title}</b>
      <p>${v.content}</p>
    </div>
  `).join("");
}

/* PAYMENT */
async function pay(){
  await fetch("/submit-payment",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({userId:"TEMP",reference:ref.value})
  });

  alert("Submitted");
}
</script>

</body>
</html>
