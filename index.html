<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DatabaseAI</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #111, #000);
  color: #fff;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 26px;
  font-weight: 600;
  background: linear-gradient(90deg, gold, #fff);
  -webkit-background-clip: text;
  color: transparent;
}

/* CHAT AREA */
.chat {
  height: calc(100vh - 180px);
  overflow-y: auto;
  padding: 20px;
  padding-bottom: 80px;
}

/* MESSAGE */
.message {
  max-width: 75%;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 18px;
  backdrop-filter: blur(20px);
  animation: fadeIn 0.3s ease;
  line-height: 1.6;
}

/* USER */
.user {
  background: rgba(255,255,255,0.05);
  margin-left: auto;
}

/* AI */
.ai {
  background: rgba(255,215,0,0.08);
  border: 1px solid rgba(255,215,0,0.2);
}

/* TYPING */
.typing {
  opacity: 0.6;
  font-style: italic;
}

/* INPUT BAR */
.input-area {
  position: fixed;
  bottom: 20px;
  width: 90%;
  left: 5%;
  display: flex;
  backdrop-filter: blur(20px);
  background: rgba(20,20,20,0.6);
  border-radius: 20px;
  padding: 10px;
}

input {
  flex: 1;
  background: transparent;
  border: none;
  color: #fff;
  padding: 15px;
  outline: none;
  font-size: 16px;
}

button {
  background: linear-gradient(90deg, gold, #ffd700);
  border: none;
  border-radius: 15px;
  padding: 10px 18px;
  font-weight: bold;
  cursor: pointer;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* MARKDOWN */
strong { color: gold; }
</style>
</head>

<body>

<div class="header">DatabaseAI</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="send()">➤</button>
</div>

<script>
const API = "https://database-backend-rnw0.onrender.com/api/chat";
const chat = document.getElementById("chat");

/* ADD MESSAGE */
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

/* FORMAT TEXT */
function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n/g, "<br>")
    .replace(/- /g, "• ");
}

/* SEND */
async function send() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  // typing indicator
  const aiDiv = addMessage("DatabaseAI is thinking...", "ai typing");

  const res = await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message,
      userId: "user_001"
    })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  let full = "";

  aiDiv.classList.remove("typing");

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    const chunk = decoder.decode(value);

    try {
      const parsed = JSON.parse(chunk);
      full += parsed.reply;
    } catch {
      full += chunk;
    }

    aiDiv.innerHTML = formatText(full);
  }
}
</script>

</body>
</html>
