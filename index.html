<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#000;
  color:#ffd700;
  overflow:hidden;
}

/* GRID BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    linear-gradient(rgba(255,215,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,215,0,0.04) 1px, transparent 1px);
  background-size:28px 28px;
  z-index:-1;
}

/* HEADER */
.header{
  text-align:center;
  padding:12px;
  font-size:14px;
  letter-spacing:3px;
}

/* CORE ORB */
.core{
  width:140px;
  height:140px;
  margin:10px auto 15px;
  border-radius:50%;
  background:radial-gradient(circle,#ffd700,#000);
  box-shadow:0 0 60px #ffd700,0 0 120px rgba(255,215,0,0.3);
  transition:0.3s;
}

.core.active{
  transform:scale(1.1);
  box-shadow:0 0 120px #ffd700;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

/* CARDS */
.card{
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,215,0,0.25);
  backdrop-filter:blur(8px);
}

.card-title{
  font-size:13px;
  margin-bottom:10px;
}

/* SUB OPTIONS */
.subgrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.small{
  padding:10px;
  border-radius:10px;
  background:#000;
  border:1px solid rgba(255,215,0,0.2);
  text-align:center;
  font-size:11px;
}

/* FLOATING AI BUTTON */
.ai-button{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:radial-gradient(circle,#ffd700,#000);
  box-shadow:0 0 20px #ffd700;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* MODE SCREEN */
.mode{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}

.mode.active{
  display:flex;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid rgba(255,215,0,0.2);
}

.back{
  border:1px solid rgba(255,215,0,0.4);
  padding:5px 10px;
  border-radius:10px;
}

/* EXPLORE */
.explore{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.explore .card{
  text-align:center;
  font-size:12px;
}

/* CHAT */
.chat{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}

.user{ background:#222; }
.ai{ background:#111; }

/* INPUT OVERLAY */
.input-overlay{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  background:#000;
  display:none;
}

.input-overlay input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
}

</style>
</head>

<body>

<div class="header">DATABASE AI</div>
<div class="core"></div>

<div class="grid">

  <div class="card" onclick="openMode('BUSINESS')">
    <div class="card-title">BUSINESS ENGINE</div>
    <div class="subgrid">
      <div class="small">Startup</div>
      <div class="small">Scale</div>
      <div class="small">Money</div>
      <div class="small">Strategy</div>
    </div>
  </div>

  <div class="card" onclick="openMode('MIND')">
    <div class="card-title">MIND SYSTEM</div>
    <div class="subgrid">
      <div class="small">Focus</div>
      <div class="small">Discipline</div>
      <div class="small">Clarity</div>
      <div class="small">Healing</div>
    </div>
  </div>

  <div class="card" onclick="openMode('ANALYSIS')">
    <div class="card-title">ANALYSIS CORE</div>
    <div class="subgrid">
      <div class="small">Breakdown</div>
      <div class="small">Patterns</div>
      <div class="small">Insights</div>
      <div class="small">Decisions</div>
    </div>
  </div>

  <div class="card" onclick="openMode('VAULT')">
    <div class="card-title">VAULT</div>
    <div class="subgrid">
      <div class="small">Ideas</div>
      <div class="small">Plans</div>
      <div class="small">Memory</div>
      <div class="small">Files</div>
    </div>
  </div>

  <div class="card" onclick="openMode('CREATE')">
    <div class="card-title">CREATE ENGINE</div>
    <div class="subgrid">
      <div class="small">App</div>
      <div class="small">Website</div>
      <div class="small">Automation</div>
      <div class="small">Systems</div>
    </div>
  </div>

  <div class="card" onclick="openMode('KNOWLEDGE')">
    <div class="card-title">KNOWLEDGE CORE</div>
    <div class="subgrid">
      <div class="small">Books</div>
      <div class="small">History</div>
      <div class="small">People</div>
      <div class="small">World</div>
    </div>
  </div>

</div>

<div class="ai-button" onclick="toggleInput()">AI</div>

<div id="mode" class="mode">

  <div class="top">
    <div class="back" onclick="closeMode()">BACK</div>
    <div id="title">SYSTEM</div>
  </div>

  <div id="explore" class="explore"></div>

  <div id="chat" class="chat"></div>

</div>

<div id="inputBox" class="input-overlay">
  <input id="input" placeholder="Speak or type...">
</div>

<script>

let currentMode="GENERAL";

/* OPEN */
function openMode(type){
  currentMode=type;
  document.getElementById("mode").classList.add("active");
  document.getElementById("title").innerText=type;
  buildExplore(type);
}

/* CLOSE */
function closeMode(){
  document.getElementById("mode").classList.remove("active");
}

/* FLOAT INPUT */
function toggleInput(){
  const box=document.getElementById("inputBox");
  box.style.display = box.style.display==="block" ? "none":"block";
}

/* EXPLORE */
function buildExplore(type){

  const explore=document.getElementById("explore");

  const data={
    BUSINESS:["Startup Plan","Make Money","Scale","Marketing","Pricing","Systems"],
    MIND:["Focus","Discipline","Confidence","Clarity","Healing","Control"],
    ANALYSIS:["Break Idea","Deep Think","Patterns","Risk","Decision","Optimize"],
    VAULT:["Save Idea","View Memory","Organize","Export","Secure","History"],
    CREATE:["Build App","Website","Automation","AI Tools","Launch","Design"],
    KNOWLEDGE:["Explain Book","Learn Topic","History","People","World","Deep"]
  };

  explore.innerHTML=data[type].map(i=>
    `<div class="card" onclick="send('${i}')">${i}</div>`
  ).join("");
}

/* SEND */
async function send(msg){

  const chat=document.getElementById("chat");

  chat.innerHTML+=`<div class="msg user">${msg}</div>`;

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:msg})
  });

  const data=await res.json();

  chat.innerHTML+=`<div class="msg ai">${data.reply}</div>`;
}

/* INPUT */
document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    send(e.target.value);
    e.target.value="";
  }
});

</script>

</body>
</html>
