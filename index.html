<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DatabaseAI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #eaeaea;
    }

    .container {
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    h1 {
      font-size: 42px;
      background: linear-gradient(90deg, gold, #fff);
      -webkit-background-clip: text;
      color: transparent;
    }

    input {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid #222;
      background: #111;
      color: #fff;
    }

    .button {
      margin-top: 15px;
      padding: 15px;
      width: 100%;
      border-radius: 30px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(90deg, gold, #333);
      color: black;
    }

    .chat-box {
      margin-top: 20px;
    }

    .msg {
      background: #111;
      padding: 15px;
      border-radius: 15px;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>DatabaseAI</h1>

  <!-- AUTH -->
  <div id="auth">
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button class="button" onclick="signup()">Sign Up</button>
    <button class="button" onclick="login()">Login</button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">

    <button class="button" onclick="logout()">Logout</button>

    <div class="chat-box" id="chat"></div>

    <input id="message" placeholder="Enter command..." />
    <button class="button" onclick="askAI()">Execute</button>

    <button class="button" onclick="premium()">Unlock Premium</button>
  </div>

</div>

<script>
const API = "https://database-backend-rnw0.onrender.com";

let token = localStorage.getItem("token");

/* AUTO LOGIN */
if (token) {
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

/* SIGNUP */
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/signup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  alert(data.message);
}

/* LOGIN */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    location.reload();
  } else {
    alert(data.message);
  }
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

/* ASK AI */
async function askAI() {
  const message = document.getElementById("message").value;
  const chat = document.getElementById("chat");

  const userMsg = document.createElement("div");
  userMsg.className = "msg";
  userMsg.innerText = "You: " + message;
  chat.appendChild(userMsg);

  const res = await fetch(API + "/ask", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  const aiMsg = document.createElement("div");
  aiMsg.className = "msg";
  aiMsg.innerText = data.reply;
  chat.appendChild(aiMsg);
}

/* PREMIUM */
function premium() {
  alert("Premium system coming next.");
}
</script>

</body>
</html>
