<!DOCTYPE html>
<html>
<head>
<title>DatabaseAI</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#000;
  color:#00fff7;
  font-family:'Orbitron', sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header {
  text-align:center;
  padding:15px;
  font-size:18px;
  color:#00fff7;
  text-shadow:0 0 10px #00fff7;
}

/* CHAT AREA */
.chat {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* MESSAGES */
.msg {
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  background:rgba(0,255,247,0.05);
  border:1px solid rgba(0,255,247,0.3);
  box-shadow:0 0 10px rgba(0,255,247,0.2);
}

.user {
  border-color:#ffd700;
  box-shadow:0 0 10px rgba(255,215,0,0.4);
}

/* INPUT AREA */
.input-area {
  padding:10px;
  border-top:1px solid #00fff7;
}

/* TEXTAREA */
textarea {
  width:100%;
  background:#000;
  color:#00fff7;
  border:1px solid #00fff7;
  border-radius:10px;
  padding:12px;
  box-shadow:0 0 10px #00fff7 inset;
  font-size:14px;
}

/* ACTION BUTTONS */
.actions {
  display:flex;
  gap:5px;
  margin-top:10px;
}

.actions button {
  flex:1;
  padding:10px;
  background:black;
  color:#00fff7;
  border:1px solid #00fff7;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,255,247,0.3);
}

/* SEND BUTTON */
.send-btn {
  width:100%;
  margin-top:10px;
  padding:14px;
  background:linear-gradient(90deg,#ffd700,#00fff7);
  border:none;
  border-radius:10px;
  font-weight:bold;
  color:black;
}

/* SCAN LINE */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:2px;
  background:#00fff7;
  top:0;
  animation:scan 4s linear infinite;
}

@keyframes scan {
  0% { top:0 }
  100% { top:100% }
}
</style>
</head>

<body>

<div class="header">DatabaseAI</div>

<div id="chat" class="chat"></div>

<div class="input-area">

  <textarea id="input" placeholder="Think, ask, paste, analyze..."></textarea>

  <div class="actions">
    <button onclick="mode='chat'">Chat</button>
    <button onclick="mode='analyze'">Analyze</button>
    <button onclick="triggerUpload()">Upload</button>
    <button onclick="loadVault()">Vault</button>
  </div>

  <input type="file" id="fileInput" style="display:none">

  <button class="send-btn" onclick="send()">EXECUTE</button>

</div>

<script>
let token = "";
let mode = "chat";

/* SEND MESSAGE */
async function send(){
  const text = document.getElementById("input").value;

  if(!text) return;

  chat.innerHTML += `<div class="msg user">${text}</div>`;

  let finalText = text;

  if(mode === "analyze"){
    finalText = "Analyze deeply:\n\n" + text;
  }

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({message:finalText})
  });

  const data = await res.json();

  typeEffect(data.reply);

  document.getElementById("input").value="";
}

/* TYPING EFFECT */
function typeEffect(text){
  let i = 0;
  let output = "";

  const box = document.createElement("div");
  box.className = "msg ai";
  document.getElementById("chat").appendChild(box);

  const interval = setInterval(()=>{
    output += text[i];
    box.innerHTML = output;
    i++;
    if(i >= text.length) clearInterval(interval);
  }, 10);
}

/* FILE UPLOAD */
function triggerUpload(){
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", async function(){
  const file = this.files[0];

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("/upload",{
    method:"POST",
    headers:{Authorization:token},
    body:formData
  });

  const data = await res.json();

  typeEffect(data.analysis);
});

/* VAULT */
async function loadVault(){
  const res = await fetch("/vault",{headers:{Authorization:token}});
  const data = await res.json();

  typeEffect(JSON.stringify(data, null, 2));
}
</script>

</body>
</html>
