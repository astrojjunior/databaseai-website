<!DOCTYPE html>
<html>
<head>
<title>DatabaseAI</title>
<style>
body { background:#000;color:#fff;font-family:sans-serif }
.screen { display:none;padding:20px }
.active { display:block }
button { margin:5px;padding:10px }
</style>
</head>

<body>

<h2>DatabaseAI</h2>

<button onclick="show('auth')">Auth</button>
<button onclick="show('ai')">AI</button>
<button onclick="show('vault')">Vault</button>
<button onclick="show('premium')">Premium</button>

<div id="auth" class="screen active">
  <input id="email" placeholder="Email"><br>
  <input id="pass" placeholder="Password"><br>
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<div id="ai" class="screen">
  <div id="chat"></div>
  <input id="msg"><button onclick="send()">Send</button>
</div>

<div id="vault" class="screen">
  <button onclick="loadVault()">Load Vault</button>
  <div id="vaultData"></div>
</div>

<div id="premium" class="screen">
  <input id="ref"><button onclick="pay()">Submit Payment</button>
</div>

<script>
let token="";

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

async function signup(){
  await fetch("/auth/signup",{method:"POST",headers:{'Content-Type':'application/json'},
  body:JSON.stringify({email:email.value,password:pass.value})});
}

async function login(){
  const r=await fetch("/auth/login",{method:"POST",headers:{'Content-Type':'application/json'},
  body:JSON.stringify({email:email.value,password:pass.value})});
  const d=await r.json();
  token=d.token;
  show('ai');
}

async function send(){
  const r=await fetch("/api/chat",{method:"POST",
  headers:{'Content-Type':'application/json','Authorization':token},
  body:JSON.stringify({message:msg.value})});
  const d=await r.json();
  chat.innerHTML += "<p>"+d.reply+"</p>";
}

async function loadVault(){
  const r=await fetch("/vault",{headers:{Authorization:token}});
  const d=await r.json();
  vaultData.innerHTML=JSON.stringify(d);
}

async function pay(){
  await fetch("/submit-payment",{method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({userId:"ID",reference:ref.value})});
}
</script>

</body>
</html>
