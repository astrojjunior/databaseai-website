<body>

<div class="container">
  <h1>DatabaseAI</h1>

  <div id="chat"></div>

  <input id="input" placeholder="Enter command..." />
  <button onclick="send()">Execute</button>
</div>

<script>
const API_URL = "https://database-backend-rnw0.onrender.com/api/chat";

async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = input.value;
  if (!message) return;

  // Show user message
  chat.innerHTML += `<p><b>You:</b> ${message}</p>`;

  input.value = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    typeText(data.reply);

  } catch (err) {
    chat.innerHTML += `<p style="color:red;">Error connecting</p>`;
  }
}

function typeText(text) {
  const chat = document.getElementById("chat");

  let i = 0;
  const p = document.createElement("p");
  p.innerHTML = "<b>AI:</b> ";
  chat.appendChild(p);

  const interval = setInterval(() => {
    p.innerHTML += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 20);
}
</script>

</body>
