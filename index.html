<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DatabaseAI God Mode</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#ffd700;
}

/* GRID */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    linear-gradient(rgba(255,215,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,215,0,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:-1;
}

/* CORE */
.core{
  width:150px;
  height:150px;
  margin:20px auto;
  border-radius:50%;
  background:radial-gradient(circle,#ffd700,#000);
  box-shadow:0 0 100px #ffd700;
  transition:0.4s;
}

.core.active{
  box-shadow:0 0 200px #ffd700;
  transform:scale(1.1);
}

/* GRID */
.system-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.system-card{
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(255,215,0,0.5);
  background:#111;
}

/* COMMAND */
.command-bar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:10px;
  padding:10px;
  background:#000;
}

.command-input{
  flex:1;
  padding:15px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}

/* MODE */
.mode-screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  flex-direction:column;
  opacity:0;
  transform:scale(1.1);
  pointer-events:none;
  transition:0.3s;
}

.mode-screen.active{
  opacity:1;
  transform:scale(1);
  pointer-events:auto;
}

.mode-header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.back-btn{
  border:1px solid #ffd700;
  padding:6px 12px;
  border-radius:10px;
}

.mode-content{
  flex:1;
  overflow:auto;
  padding:15px;
}

.msg{
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}

.user{ background:#222; }
.ai{ background:#111; }

</style>
</head>

<body>

<div style="text-align:center;padding:10px;">DATABASE AI — GOD MODE</div>
<div class="core"></div>

<div class="system-grid">
  <div class="system-card" onclick="openMode()">BUSINESS</div>
  <div class="system-card" onclick="openMode()">MIND</div>
  <div class="system-card" onclick="openMode()">ANALYSIS</div>
  <div class="system-card" onclick="openMode()">CREATE</div>
</div>

<div class="command-bar">
  <input id="quickInput" class="command-input" placeholder="Command the system...">
</div>

<div id="modeScreen" class="mode-screen">
  <div class="mode-header">
    <div class="back-btn" onclick="closeMode()">RETURN</div>
    <div>AI CORE</div>
  </div>

  <div id="chat" class="mode-content"></div>
</div>

<script>

/* MEMORY BRAIN */
let brain = JSON.parse(localStorage.getItem("brain")||"{}");

/* SAVE BRAIN */
function saveBrain(){
  localStorage.setItem("brain", JSON.stringify(brain));
}

/* OPEN */
function openMode(){
  document.getElementById("modeScreen").classList.add("active");
}

/* CLOSE */
function closeMode(){
  document.getElementById("modeScreen").classList.remove("active");

  const core=document.querySelector(".core");
  core.classList.add("active");
  setTimeout(()=>core.classList.remove("active"),600);
}

/* SEND */
async function send(msg){

  const chat=document.getElementById("chat");
  chat.innerHTML+=`<div class="msg user">${msg}</div>`;

  /* CONTEXT BUILD */
  let context = brain.lastTopic || "";

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      message: `
User context: ${context}

User says: ${msg}

Respond like a high-level strategic AI.
Be intelligent, refined, and aware.
`
    })
  });

  const data=await res.json();

  typeEffect(data.reply, chat);
  speak(data.reply);

  /* UPDATE BRAIN */
  brain.lastTopic = msg;
  brain.lastResponse = data.reply;
  saveBrain();
}

/* TYPE EFFECT */
function typeEffect(text, el){
  let i=0;
  let div=document.createElement("div");
  div.className="msg ai";
  el.appendChild(div);

  let interval=setInterval(()=>{
    div.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },10);
}

/* VOICE */
function speak(text){
  const speech=new SpeechSynthesisUtterance(text);
  speech.lang="en-GB";
  speech.rate=0.9;
  speechSynthesis.speak(speech);
}

/* COMMAND INPUT */
document.getElementById("quickInput").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    openMode();
    send(e.target.value);
    e.target.value="";
  }
});

/* SMART SUGGESTION SYSTEM */
setTimeout(()=>{
  if(!brain.lastTopic){
    send("Guide me to build something powerful.");
  }
},2000);

</script>

</body>
</html>
