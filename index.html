<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DatabaseAI</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#ffd700;
  overflow-x:hidden;
}

/* GRID BACKGROUND */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,215,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,215,0,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:-1;
}

/* TITLE */
.header{
  text-align:center;
  padding:10px;
  font-weight:bold;
}

/* CORE */
.core{
  width:120px;
  height:120px;
  margin:30px auto;
  border-radius:50%;
  background:radial-gradient(circle,#ffd700,#000);
  box-shadow:0 0 40px #ffd700;
}

/* SYSTEM GRID */
.system-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:15px;
}

.system-card{
  background: rgba(255,215,0,0.05);
  border:1px solid rgba(255,215,0,0.4);
  border-radius:15px;
  padding:15px;
  box-shadow:0 0 15px rgba(255,215,0,0.2);
  transition:0.3s;
}

.system-card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(255,215,0,0.6);
}

/* MODE SCREEN */
.mode-screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}

.mode-screen.active{
  display:flex;
}

.mode-header{
  padding:15px;
  text-align:center;
  font-weight:bold;
  border-bottom:1px solid rgba(255,215,0,0.3);
}

.mode-content{
  flex:1;
  overflow:auto;
  padding:15px;
}

/* INPUT */
textarea{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
}

/* BUTTON */
.send-btn{
  width:100%;
  padding:15px;
  margin-top:10px;
  background:linear-gradient(90deg,#ffd700,#00ffcc);
  border:none;
  border-radius:10px;
  font-weight:bold;
}

/* CHAT */
.chat-box{
  margin-top:10px;
}

.msg{
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}

.user{
  background:#222;
}

.ai{
  background:rgba(255,215,0,0.1);
}
</style>
</head>

<body>

<div class="header">DatabaseAI</div>
<div class="core"></div>

<!-- SYSTEM GRID -->
<div class="system-grid">

  <div class="system-card" onclick="openMode('business')">
    💼 Business Engine
  </div>

  <div class="system-card" onclick="openMode('mind')">
    🧠 Mind System
  </div>

  <div class="system-card" onclick="openMode('analysis')">
    📊 Analysis Core
  </div>

  <div class="system-card" onclick="openMode('vault')">
    🗂 Vault
  </div>

  <div class="system-card" onclick="openMode('create')">
    ⚡ Create Engine
  </div>

</div>

<!-- MODE SCREEN -->
<div id="modeScreen" class="mode-screen">
  <div class="mode-header" id="modeTitle"></div>
  <div class="mode-content" id="modeContent"></div>
</div>

<script>

let mode = "chat";

/* OPEN MODE */
function openMode(type){
  const screen = document.getElementById("modeScreen");
  const title = document.getElementById("modeTitle");
  const content = document.getElementById("modeContent");

  screen.classList.add("active");

  if(type==="business"){
    title.innerText="Business Engine";
    content.innerHTML=getChatUI();
    mode="business";
  }

  if(type==="mind"){
    title.innerText="Mind System";
    content.innerHTML=getChatUI();
    mode="mind";
  }

  if(type==="analysis"){
    title.innerText="Analysis Core";
    content.innerHTML=`
      <textarea id="input"></textarea>
      <button class="send-btn" onclick="send()">Analyze</button>
      <div id="chat" class="chat-box"></div>
    `;
    mode="analysis";
  }

  if(type==="vault"){
    title.innerText="Vault";
    content.innerHTML=`
      <button class="send-btn" onclick="clearVault()">Clear Vault</button>
      <div id="vaultData"></div>
    `;
    loadVault();
  }

  if(type==="create"){
    title.innerText="Create Engine";
    content.innerHTML=`
      <textarea id="input" placeholder="Describe what you want to build..."></textarea>
      <button class="send-btn" onclick="send()">Build</button>
      <div id="chat" class="chat-box"></div>
    `;
    mode="create";
  }
}

/* CHAT UI */
function getChatUI(){
  return `
    <textarea id="input" placeholder="Ask anything..."></textarea>
    <button class="send-btn" onclick="send()">Execute</button>
    <div id="chat" class="chat-box"></div>
  `;
}

/* SEND */
async function send(){
  const input = document.getElementById("input").value;
  if(!input) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:input})
  });

  const data = await res.json();

  chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;

  saveMemory(input, data.reply);
}

/* MEMORY */
function saveMemory(user, ai){
  let mem = JSON.parse(localStorage.getItem("memory") || "[]");
  mem.push({user, ai});
  localStorage.setItem("memory", JSON.stringify(mem));
}

/* LOAD VAULT */
function loadVault(){
  let mem = JSON.parse(localStorage.getItem("memory") || "[]");
  let html="";
  mem.forEach(m=>{
    html+=`<div class="msg user">${m.user}</div>`;
    html+=`<div class="msg ai">${m.ai}</div>`;
  });
  document.getElementById("vaultData").innerHTML=html;
}

/* CLEAR */
function clearVault(){
  localStorage.removeItem("memory");
  loadVault();
}

</script>

</body>
</html>
