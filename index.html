<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#000;
  color:#ffd700;
}

/* GRID BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    linear-gradient(rgba(255,215,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,215,0,0.04) 1px, transparent 1px);
  background-size:28px 28px;
}

/* HEADER */
.header{
  text-align:center;
  padding:12px;
  font-size:16px;
  letter-spacing:4px;
}

/* STATUS */
.status{
  text-align:center;
  font-size:11px;
  opacity:0.6;
}

/* CORE */
.core{
  width:160px;
  height:160px;
  margin:15px auto;
  border-radius:50%;
  background:radial-gradient(circle,#ffd700,#000);
  box-shadow:0 0 100px #ffd700;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

.card{
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,215,0,0.25);
}

.card-title{
  font-size:13px;
  margin-bottom:10px;
}

/* SUB */
.subgrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.small{
  padding:10px;
  border-radius:10px;
  background:#000;
  border:1px solid rgba(255,215,0,0.2);
  text-align:center;
  font-size:11px;
}

/* SESSIONS */
.sessions{
  display:flex;
  overflow-x:auto;
  gap:6px;
  padding:6px;
}

.session{
  padding:6px 10px;
  border:1px solid rgba(255,215,0,0.3);
  border-radius:10px;
  font-size:10px;
}

.active-session{
  background:rgba(255,215,0,0.2);
}

/* MODE SCREEN */
.mode{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}

.mode.active{display:flex;}

.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.back{
  border:1px solid #ffd700;
  padding:6px 12px;
  border-radius:10px;
}

/* BUILDER */
.builder{
  padding:10px;
  border-bottom:1px solid rgba(255,215,0,0.2);
}

.builder-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

/* CHAT */
.chat{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  padding:10px;
  margin:6px 0;
  border-radius:10px;
}

.user{background:#222;}
.ai{background:#111;}
</style>
</head>

<body>

<div class="header">DATABASE AI</div>
<div class="status" id="status">System Ready</div>

<div class="sessions" id="sessions"></div>

<div class="core"></div>

<div class="grid">

<div class="card" onclick="openMode('BUSINESS ENGINE')">
<div class="card-title">BUSINESS ENGINE</div>
<div class="subgrid">
<div class="small">Startup</div>
<div class="small">Scale</div>
<div class="small">Money</div>
<div class="small">Strategy</div>
</div>
</div>

<div class="card" onclick="openMode('MIND SYSTEM')">
<div class="card-title">MIND SYSTEM</div>
<div class="subgrid">
<div class="small">Focus</div>
<div class="small">Discipline</div>
<div class="small">Clarity</div>
<div class="small">Healing</div>
</div>
</div>

<div class="card" onclick="openMode('ANALYSIS CORE')">
<div class="card-title">ANALYSIS CORE</div>
<div class="subgrid">
<div class="small">Breakdown</div>
<div class="small">Patterns</div>
<div class="small">Insights</div>
<div class="small">Decisions</div>
</div>
</div>

<div class="card" onclick="openMode('VAULT')">
<div class="card-title">VAULT</div>
<div class="subgrid">
<div class="small">Ideas</div>
<div class="small">Plans</div>
<div class="small">Memory</div>
<div class="small">Files</div>
</div>
</div>

</div>

<!-- MODE SCREEN -->
<div id="mode" class="mode">

<div class="top">
<div class="back" onclick="closeMode()">BACK</div>
<div id="title">SYSTEM</div>
</div>

<div class="builder">
<div>Build System</div>
<div class="builder-grid">
<div class="small" onclick="build('business')">Business</div>
<div class="small" onclick="build('app')">App</div>
<div class="small" onclick="build('website')">Website</div>
<div class="small" onclick="build('money')">Money</div>
</div>
</div>

<div id="chat" class="chat"></div>

</div>

<script>

/* =====================
   SESSIONS
===================== */
let sessions = JSON.parse(localStorage.getItem("sessions")||"[]");
let currentSession = null;

function save(){
  localStorage.setItem("sessions",JSON.stringify(sessions));
}

function createSession(name){
  const s = {
    id:Date.now(),
    name,
    messages:[]
  };
  sessions.push(s);
  currentSession = s;
  save();
  renderSessions();
}

function renderSessions(){
  const el=document.getElementById("sessions");
  el.innerHTML=sessions.map(s=>
    `<div class="session ${currentSession&&s.id===currentSession.id?'active-session':''}"
    onclick="switchSession(${s.id})">${s.name}</div>`
  ).join("");
}

function switchSession(id){
  currentSession=sessions.find(s=>s.id===id);
  const chat=document.getElementById("chat");
  chat.innerHTML=currentSession.messages.map(m=>
    `<div class="msg ${m.type}">${m.text}</div>`
  ).join("");
  renderSessions();
}

/* =====================
   MODE
===================== */
function openMode(type){
  document.getElementById("mode").classList.add("active");
  document.getElementById("title").innerText = type;
}

function closeMode(){
  document.getElementById("mode").classList.remove("active");
}

/* =====================
   SEND AI
===================== */
async function send(msg){

  if(!currentSession){
    createSession(msg.slice(0,10));
  }

  const chat=document.getElementById("chat");

  chat.innerHTML+=`<div class="msg user">${msg}</div>`;

  currentSession.messages.push({type:"user",text:msg});
  save();

  document.getElementById("status").innerText="Building...";

  const res = await fetch("https://database-backend-rnw0.onrender.com/api/chat", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:msg
    })
  });

  const data = await res.json();

  chat.innerHTML+=`<div class="msg ai">${data.reply}</div>`;

  currentSession.messages.push({type:"ai",text:data.reply});
  save();

  document.getElementById("status").innerText="Ready";
}

/* =====================
   BUILDER
===================== */
function build(type){
  send("Build "+type+" with full strategy and steps");
}

/* INIT */
renderSessions();

</script>

</body>
</html>
