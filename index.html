<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DatabaseAI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#ffd700;
}

/* GRID BACKGROUND */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,215,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,215,0,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:-1;
}

/* CORE */
.core{
  width:150px;
  height:150px;
  margin:20px auto;
  border-radius:50%;
  background:radial-gradient(circle,#ffd700,#000);
  box-shadow:0 0 80px #ffd700;
  transition:0.3s;
}

.core.active{
  box-shadow:0 0 150px #ffd700;
  transform:scale(1.1);
}

/* GRID */
.system-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.system-card{
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(255,215,0,0.4);
  background:#111;
}

.system-card h3{ margin:0; }

/* COMMAND */
.command-bar{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  background:#000;
  display:flex;
  gap:10px;
}

.command-input{
  flex:1;
  padding:15px;
  background:#111;
  border:none;
  border-radius:10px;
  color:#fff;
}

.mic-btn{
  padding:10px;
  border-radius:10px;
  border:1px solid #ffd700;
  background:#000;
  color:#ffd700;
}

/* MODE */
.mode-screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  flex-direction:column;
  opacity:0;
  transform:scale(1.1);
  pointer-events:none;
  transition:0.3s;
}

.mode-screen.active{
  opacity:1;
  transform:scale(1);
  pointer-events:auto;
}

.mode-header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.back-btn{
  border:1px solid #ffd700;
  padding:5px 10px;
  border-radius:10px;
}

.mode-content{
  flex:1;
  overflow:auto;
  padding:15px;
}

.msg{
  margin:5px 0;
  padding:10px;
  border-radius:10px;
}

.user{ background:#222; }
.ai{ background:#111; }

</style>
</head>

<body>

<div style="text-align:center;padding:10px;">DATABASE AI</div>
<div class="core"></div>

<div class="system-grid">
  <div class="system-card" onclick="openMode()">BUSINESS</div>
  <div class="system-card" onclick="openMode()">MIND</div>
  <div class="system-card" onclick="openMode()">ANALYSIS</div>
  <div class="system-card" onclick="openMode()">VAULT</div>
</div>

<div class="command-bar">
  <input id="quickInput" class="command-input" placeholder="Command...">
  <button class="mic-btn" onclick="startVoice()">🎤</button>
</div>

<div id="modeScreen" class="mode-screen">
  <div class="mode-header">
    <div class="back-btn" onclick="closeMode()">RETURN</div>
    <div>AI</div>
  </div>

  <div id="chat" class="mode-content"></div>
</div>

<script>

/* OPEN */
function openMode(){
  document.getElementById("modeScreen").classList.add("active");
}

/* CLOSE */
function closeMode(){
  document.getElementById("modeScreen").classList.remove("active");
  const core=document.querySelector(".core");
  core.classList.add("active");
  setTimeout(()=>core.classList.remove("active"),500);
}

/* SEND */
async function send(msg){
  const chat=document.getElementById("chat");

  chat.innerHTML+=`<div class="msg user">${msg}</div>`;

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:msg})
  });

  const data=await res.json();

  typeEffect(data.reply, chat);

  speak(data.reply);
}

/* TYPE EFFECT */
function typeEffect(text, el){
  let i=0;
  let div=document.createElement("div");
  div.className="msg ai";
  el.appendChild(div);

  let interval=setInterval(()=>{
    div.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },10);
}

/* VOICE INPUT */
function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();

  recognition.onresult = function(event){
    const text=event.results[0][0].transcript;
    openMode();
    send(text);
  };

  recognition.start();
}

/* VOICE OUTPUT */
function speak(text){
  const speech=new SpeechSynthesisUtterance(text);
  speech.rate=0.9;
  speech.pitch=1;
  speech.lang="en-GB";
  speechSynthesis.speak(speech);
}

/* ENTER KEY */
document.getElementById("quickInput").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    openMode();
    send(e.target.value);
    e.target.value="";
  }
});

</script>

</body>
</html>
